################################################################################
# Autopayke — Render Blueprint
#
# Deploy with: https://dashboard.render.com/select-repo
# Then choose "Use render.yaml" when prompted.
#
# After deploy, set these environment variables manually in the Render dashboard
# (marked "sync: false" below — they are intentionally left out of this file
#  because they contain secrets, or because their value depends on a deploy
#  step that hasn't happened yet, e.g. the contract addresses below):
#
#   DATABASE_URL            → your Neon PostgreSQL connection string
#   JWT_ACCESS_SECRET       → (copy from backend/.env — the generated value)
#   JWT_REFRESH_SECRET      → (copy from backend/.env — the generated value)
#   OPERATIONS_API_TOKEN    → secret token for /api/ops/* recovery endpoints
#   WALLET_DERIVE_SECRET    → (copy from backend/.env — NEVER rotate after launch)
#   PAYSTACK_SECRET_KEY     → sk_live_...
#   PAYSTACK_WEBHOOK_SECRET → from Paystack dashboard → Settings → Webhooks
#   AT_API_KEY              → Africa's Talking API key (WhatsApp claim links)
#   AT_USERNAME             → Africa's Talking username
#   AT_WHATSAPP_SENDER      → WhatsApp sender ID from Africa's Talking
#   RELAYER_PRIVATE_KEY     → funded EOA that pays gas for wallet deploys/sponsorship.
#                             Prefer RELAYER_KMS_KEY_ID instead once AWS KMS is set up
#                             (see backend/src/lib/kms-signer.ts) — leave this unset then.
#   RELAYER_KMS_KEY_ID      → AWS KMS key ARN/id for the relayer, if using KMS
#   SIGNER_PRIVATE_KEY      → key that signs escrow claims (NEVER rotate after launch).
#                             Same KMS preference as above via SIGNER_KMS_KEY_ID.
#   SIGNER_KMS_KEY_ID       → AWS KMS key ARN/id for the signer, if using KMS
#   SIGNER_ADDRESS          → address derived from SIGNER_PRIVATE_KEY or the KMS key
#   TUMA_REGISTRY_ADDRESS   → from contracts/script/Deploy.s.sol mainnet run
#   TUMA_FACTORY_ADDRESS    → from contracts/script/Deploy.s.sol mainnet run
#   TUMA_ESCROW_ADDRESS     → from contracts/script/Deploy.s.sol mainnet run
#   TUMA_PAYMASTER_ADDRESS  → from contracts/script/Deploy.s.sol mainnet run
#   TREASURY_ADDRESS        → wallet that receives merchant fees + cash-out withdrawals
#   USDC_ADDRESS/USDT_ADDRESS → only needed if overriding the mainnet defaults in code
#   OPEN_EXCHANGE_RATES_APP_ID → from openexchangerates.org — FX quotes fail without this
#   TWILIO_ACCOUNT_SID/AUTH_TOKEN/PHONE_NUMBER → OTP SMS fallback; without these OTP only logs to console
#   RESEND_API_KEY          → from resend.com — primary OTP delivery channel (email)
################################################################################

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: tumabackendservice
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # ── Database (set manually — Neon external) ────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── Redis (auto-wired from the Redis service below) ───────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: autopayke-redis
          property: connectionString

      # ── JWT secrets (set manually — copy from backend/.env) ───────────────
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # ── Operations API (set manually; protects /api/ops/*) ────────────────
      - key: OPERATIONS_API_TOKEN
        sync: false
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: "30000"
      - key: WORKER_HEARTBEAT_STALE_SECONDS
        value: "120"
      - key: SCANNER_HEARTBEAT_STALE_SECONDS
        value: "900"

      # ── Wallet derivation (set manually — NEVER rotate after first deploy) ─
      - key: WALLET_DERIVE_SECRET
        sync: false

      # ── Paystack (set manually) ────────────────────────────────────────────
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false

      # ── Africa's Talking WhatsApp (set manually; omit for demo/log mode) ──
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_WHATSAPP_SENDER
        sync: false
      - key: AT_WHATSAPP_OTP_TEMPLATE
        value: autopayke_otp
      - key: AT_ENV
        value: production

      # ── Resend (email) — primary OTP delivery channel while Twilio SMS
      #    isn't reliably configured (trial account) ───────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "Autopayke <noreply@autopayke.com>"

      # ── Avalanche ─────────────────────────────────────────────────────────
      - key: AVALANCHE_RPC_URL
        value: https://api.avax.network/ext/bc/C/rpc
      - key: AVALANCHE_CHAIN_ID
        value: "43114"
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: RELAYER_KMS_KEY_ID
        sync: false
      - key: SIGNER_PRIVATE_KEY
        sync: false
      - key: SIGNER_KMS_KEY_ID
        sync: false
      - key: SIGNER_ADDRESS
        sync: false

      # ── Smart contracts (mainnet, chain 43114 — set after mainnet deploy) ──
      - key: TUMA_REGISTRY_ADDRESS
        sync: false
      - key: TUMA_FACTORY_ADDRESS
        sync: false
      - key: TUMA_ESCROW_ADDRESS
        sync: false
      - key: TUMA_PAYMASTER_ADDRESS
        sync: false

      # ── Treasury wallet (receives merchant fees and cash-out withdrawals) ──
      - key: TREASURY_ADDRESS
        sync: false

      # ── Token addresses (defaults in code match Avalanche mainnet; override
      #    only if different) ─────────────────────────────────────────────────
      - key: USDC_ADDRESS
        sync: false
      - key: USDT_ADDRESS
        sync: false

      # ── FX rates ─────────────────────────────────────────────────────────
      - key: OPEN_EXCHANGE_RATES_APP_ID
        sync: false
      - key: FX_SPREAD
        value: "0.023"

      # ── Twilio (OTP SMS — without these, OTP silently no-ops to logs only) ─
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # ── CORS / App URLs ───────────────────────────────────────────────────
      # Update these to match wherever the frontend is actually hosted —
      # if Vercel serves a custom domain, it must be listed here too or the
      # browser will reject API calls with a CORS error.
      - key: CORS_ORIGINS
        value: https://autopayke.com,https://autopayke.vercel.app
      - key: API_BASE_URL
        value: https://tumabackendservice.onrender.com
      - key: APP_URL
        value: https://autopayke.com

  # ── Background workers ──────────────────────────────────────────────────────
  # Settlement polling, escrow expiry/refund, rail disbursement, and WhatsApp
  # notifications all run as BullMQ workers consuming Redis queues — without
  # this service none of them run at all, and queued jobs (escrow refunds,
  # rail payouts, notifications) just sit in Redis forever. Combined into one
  # process (src/workers/all.worker.ts) rather than four separate services —
  # these are low-volume queues that don't need independent scaling.
  - type: worker
    name: autopayke-workers
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: bun run worker:all
    plan: starter
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: autopayke-redis
          property: connectionString
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: "30000"
      - key: WORKER_HEARTBEAT_STALE_SECONDS
        value: "120"
      - key: SCANNER_HEARTBEAT_STALE_SECONDS
        value: "900"
      - key: WALLET_DERIVE_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_WHATSAPP_SENDER
        sync: false
      - key: AT_WHATSAPP_OTP_TEMPLATE
        value: autopayke_otp
      - key: AT_ENV
        value: production
      - key: AVALANCHE_RPC_URL
        value: https://api.avax.network/ext/bc/C/rpc
      - key: AVALANCHE_CHAIN_ID
        value: "43114"
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: RELAYER_KMS_KEY_ID
        sync: false
      - key: SIGNER_PRIVATE_KEY
        sync: false
      - key: SIGNER_KMS_KEY_ID
        sync: false
      - key: SIGNER_ADDRESS
        sync: false
      - key: TUMA_REGISTRY_ADDRESS
        sync: false
      - key: TUMA_FACTORY_ADDRESS
        sync: false
      - key: TUMA_ESCROW_ADDRESS
        sync: false
      - key: TUMA_PAYMASTER_ADDRESS
        sync: false
      - key: CHAIN_EVENT_SCAN_LOOKBACK_BLOCKS
        value: "100000"
      - key: CHAIN_EVENT_SCAN_BATCH_BLOCKS
        value: "2000"
      - key: CHAIN_EVENT_SCAN_CONFIRMATIONS
        value: "2"
      - key: TREASURY_ADDRESS
        sync: false
      - key: USDC_ADDRESS
        sync: false
      - key: USDT_ADDRESS
        sync: false
      - key: OPEN_EXCHANGE_RATES_APP_ID
        sync: false
      - key: FX_SPREAD
        value: "0.023"

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: autopayke-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
